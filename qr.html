<!DOCTYPE html>
<html>
<head>
  <title>Soulane — Scan to Connect</title>
  <style>
    body { background: #0C0B0F; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
    h1 { color: #FFD600; font-size: 28px; margin-bottom: 4px; letter-spacing: -1px; }
    p { color: #FF4D8D; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 32px; }
    #qr { background: white; padding: 24px; border-radius: 16px; }
    .url { color: #888; font-size: 13px; margin-top: 24px; font-family: monospace; }
  </style>
</head>
<body>
  <h1>SOULANE</h1>
  <p>Scan with Expo Go</p>
  <div id="qr"></div>
  <div class="url">exp://192.168.1.8:8081</div>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script>
    var qr = qrcode(0, 'M');
    qr.addData('exp://192.168.1.8:8081');
    qr.make();
    document.getElementById('qr').innerHTML = qr.createSvgTag({ cellSize: 8, margin: 0 });
  </script>
</body>
</html>
